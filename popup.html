<!DOCTYPE html>
<html>

<head>
    <title>Emoji Censor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Emoji Censor</h2>

    <h3>Hide Emojis</h3>
    <input id="hideInput" placeholder="Enter emoji (😂)" />
    <button id="addHide">Add</button>

    <h3>Replace Emoji</h3>
    <input id="fromEmoji" placeholder="From 😂" />
    <input id="toEmoji" placeholder="To 😹" />
    <button id="addReplace">Add</button>

    <h3>Allowed Websites</h3>
    <input id="siteInput" placeholder="example.com" />
    <button id="addSite">Add</button>

    <h3>Hidden Emojis</h3>
    <ul id="hideListDisplay"></ul>

    <h3>Replace Rules</h3>
    <ul id="replaceListDisplay"></ul>

    <h3>Sites</h3>
    <ul id="siteListDisplay"></ul>

    <button id="clearAll">Clear All</button>

    <script src="popup.js"></script>
</body>

</html>
