<!DOCTYPE html>
<html>

<head>
    <title>Emoji Censor</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
</head>

<body>
<div class="popup-wrap">

    <!-- HEADER -->
    <div class="popup-header">
        <div class="icon-wrap">🚫</div>
        <div>
            <h1>Emoji Censor</h1>
            <div class="subtitle" id="statsLabel">0 rules · 0 sites</div>
        </div>
    </div>

    <!-- ADD RULE -->
    <div class="section">
        <div class="section-label">Add rule</div>
        <div class="input-row">
            <input id="hideInput" placeholder="Paste or pick an emoji" autocomplete="off" />
            <button id="emojiPickerBtn" class="btn-icon" title="Pick emoji">😊</button>
            <button id="addHide" class="btn-add">+ Add</button>
        </div>
    </div>

    <!-- RULES LIST -->
    <div class="section">
        <div class="section-label">Emoji rules</div>
        <ul id="hideListDisplay"></ul>
    </div>

    <!-- SITES -->
    <div class="section">
        <div class="section-label">Allowed websites</div>
        <div class="input-row">
            <input id="siteInput" placeholder="example.com" />
            <button id="addSite" class="btn-add">+ Add</button>
        </div>
        <ul id="siteListDisplay"></ul>
    </div>

    <!-- FOOTER -->
    <div class="popup-footer">
        <button id="clearAll">Clear all data</button>
    </div>

</div>

<!-- EMOJI PICKER OVERLAY -->
<div id="emojiPicker" class="emoji-picker hidden">
    <div class="picker-search-row">
        <input id="emojiSearch" placeholder="Search emoji..." autocomplete="off" />
    </div>
    <div class="picker-categories" id="pickerCategories"></div>
    <div class="picker-grid" id="pickerGrid"></div>
</div>

<script src="popup.js"></script>
</body>

</html>
