<!DOCTYPE html>
<html>

<head>
    <title>Emoji Censor</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
</head>

<body>
    <h2>Emoji Censor</h2>

    <!-- 🔹 ADD EMOJI -->
    <h3>Add Emoji</h3>
    <input id="hideInput" placeholder="Enter emoji (😂)" />
    <button id="addHide">Add</button>

    <!-- 🔹 RULES LIST -->
    <h3>Emoji Rules</h3>
    <ul id="hideListDisplay"></ul>

    <!-- 🔹 SITES -->
    <h3>Allowed Websites</h3>
    <input id="siteInput" placeholder="example.com" />
    <button id="addSite">Add</button>

    <ul id="siteListDisplay"></ul>

    <!-- 🔹 DEV TOOL -->
    <button id="clearAll">Clear All</button>

    <script src="popup.js"></script>
</body>

</html>
